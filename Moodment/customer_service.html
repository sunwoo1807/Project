<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service</title>
    <link rel="stylesheet" href="customer_service.css">
</head>
<body>
    <iframe src="header.html" class="header-frame" scrolling="no"></iframe>

    <div class="contact-container">
        <div class="info-section">
            <h2>연락처 정보</h2>

            <div class="details">
                <div class="office">
                    <h3>사무실</h3>
                    <p>서울 용산구 남산공원길 105</p>
                    <p>02-3455-9277</p>
                    <p>02-3455-9277</p>
                    <p>naver.com</p>
                </div>
                <div class="management">
                    <h3>관리</h3>
                    <p>서울시 관악구 관악로 1 서울대학교</p>
                    <p>02-880-5114</p>
                    <p>02-885-5272</p>
                    <p>gmail.com</p>
                </div>
            </div>
        </div>

        <div class="form-section">
            <form>
                <div class="row">
                  <input type="text" placeholder="여기에 성함을 작성해주세요.">
                  <input type="email" placeholder="여기에 이메일 주소를 입력해주세요.">
                </div>
                <input type="tel" placeholder="전화번호를 입력해주세요.">
                <input type="text" placeholder="여기에 제목을 입력해주세요.">
                <textarea placeholder="여기에 문의사항을 작성해주세요."></textarea>
                <button type="submit">제출하다</button>
            </form>
        </div>
    </div>
    <iframe src="footer.html" class="footer-frame"></iframe>
</body>
</html>
