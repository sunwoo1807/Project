<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home</title>
    <link rel="stylesheet" href="my_home.css">
</head>
<body>
    <iframe src="header.html" class="header-frame" scrolling="no"></iframe>

    <div class="login-container">
        <div class="section-title">소셜 계정으로 로그인</div>
        <div class="social-buttons">
          <button class="social-btn google"><i class="icon-google"></i> GOOGLE</button>
          <button class="social-btn facebook"><i class="icon-facebook"></i> 페이스북</button>
        </div>

        <div class="section-title">
            또는 이메일로 로그인하세요
        </div>
            <form class="login-form">
                <input type="email" placeholder="이메일 주소를 입력하세요">
                <input type="password" placeholder="비밀번호를 입력하세요">
    
                <div class="form-options">
                    <label><input type="checkbox"> 계정 기억하기</label>
                    <a href="#" class="forgot-password">비밀번호를 잊으셨나요?</a>
                </div>
    
                <button type="submit" class="login-submit-btn">로그인</button>
            </form>
    </div>

    <iframe src="footer.html" class="footer-frame"></iframe>
</body>
</html>
